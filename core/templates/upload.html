<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Medical Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .drop-zone--over { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-xl rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h2 class="text-2xl font-bold">Medical Record Upload</h2>
            <p class="text-blue-100 text-sm mt-1">Ensure all fields are accurate for the patient file.</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Patient ID</label>
                    <input type="number" id="patient" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" 
                        placeholder="Ex: 10293">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Doctor ID</label>
                    <input type="number" id="doctor" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" 
                        placeholder="Ex: 5542">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Clinical Notes / Description</label>
                <textarea id="desc" rows="3"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" 
                    placeholder="Brief summary of the record..."></textarea>
            </div>

            <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center hover:border-blue-400 transition-colors cursor-pointer group">
                <input type="file" id="file" class="hidden">
                <div class="flex flex-col items-center">
                    <svg class="w-12 h-12 text-slate-400 group-hover:text-blue-500 transition-colors mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-slate-600 font-medium" id="file-label">Click to upload or drag & drop</p>
                    <p class="text-xs text-slate-400 mt-1">PDF, JPG, or PNG (Max 10MB)</p>
                </div>
            </div>

            <button onclick="upload()" id="upload-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transform active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                <span>Upload Record</span>
            </button>

            <p id="status" class="text-center text-sm font-medium hidden"></p>
        </div>
    </div>

    <script>
        // File input UI interaction
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file');
        const fileLabel = document.getElementById('file-label');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = () => {
            if (fileInput.files.length > 0) {
                fileLabel.innerText = "Selected: " + fileInput.files[0].name;
                fileLabel.classList.add('text-blue-600');
            }
        };

        // Existing Backend Logic
        function upload() {
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('status');
            
            // Basic UI validation check
            if (!fileInput.files[0]) {
                status.innerText = "Please select a file first.";
                status.className = "text-center text-sm font-medium text-red-500 block";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span>Uploading...</span>`;

            let formData = new FormData();
            formData.append("patient_id", document.getElementById("patient").value);
            formData.append("doctor_id", document.getElementById("doctor").value);
            formData.append("description", document.getElementById("desc").value);
            formData.append("file", fileInput.files[0]);

            fetch('/upload/', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                status.innerText = data.message || data.error;
                status.className = `text-center text-sm font-medium block ${data.error ? 'text-red-500' : 'text-emerald-600'}`;
            })
            .catch(err => {
                status.innerText = "Connection Error";
                status.className = "text-center text-sm font-medium text-red-500 block";
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<span>Upload Record</span>`;
            });
        }
    </script>

</body>
</html>
