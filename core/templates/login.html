<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100 fade-in">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-1">Sign in to your account via OTP</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Mobile Number</label>
                <div class="relative">
                    <input type="text" id="mobile" 
                        class="w-full pl-4 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all" 
                        placeholder="Enter your mobile">
                </div>
            </div>
            
            <button onclick="sendOTP()" id="btn-send"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all active:scale-[0.98]">
                Send Verification Code
            </button>
        </div>

        <div class="my-8 flex items-center before:flex-1 before:border-t before:border-gray-200 after:flex-1 after:border-t after:border-gray-200">
            <span class="px-3 text-xs text-gray-400 uppercase">Verification</span>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">OTP Code</label>
                <input type="text" id="otp" 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl tracking-[0.5em] text-center text-xl font-bold focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:outline-none transition-all" 
                    placeholder="····">
            </div>

            <button onclick="verifyOTP()" id="btn-verify"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all active:scale-[0.98]">
                Verify & Login
            </button>
        </div>

        <p id="status-msg" class="mt-6 text-center text-sm font-medium hidden"></p>
    </div>

    <script>
        const statusMsg = document.getElementById('status-msg');

        function updateStatus(text, type) {
            statusMsg.innerText = text;
            statusMsg.classList.remove('hidden', 'text-red-500', 'text-blue-600', 'text-emerald-600');
            
            if(type === 'error') statusMsg.classList.add('text-red-500');
            else if(type === 'info') statusMsg.classList.add('text-blue-600');
            else statusMsg.classList.add('text-emerald-600');
        }

        function sendOTP() {
            const btn = document.getElementById('btn-send');
            btn.innerText = "Sending...";
            
            fetch('/auth/send-otp/', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'mobile=' + encodeURIComponent(document.getElementById('mobile').value)
            })
            .then(res => res.json())
            .then(data => {
                updateStatus(data.message, 'info');
                btn.innerText = "Send Verification Code";
            })
            .catch(() => {
                updateStatus("Failed to connect to server.", "error");
                btn.innerText = "Send Verification Code";
            });
        }

        function verifyOTP() {
            const btn = document.getElementById('btn-verify');
            btn.innerText = "Verifying...";

            fetch('/auth/verify-otp/', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'otp=' + encodeURIComponent(document.getElementById('otp').value)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    updateStatus(data.error, "error");
                } else {
                    updateStatus(data.message || "Success!", "success");
                }
                btn.innerText = "Verify & Login";
            })
            .catch(() => {
                updateStatus("Verification failed. Check connection.", "error");
                btn.innerText = "Verify & Login";
            });
        }
    </script>

</body>
</html>
